name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Frontend check ──
  frontend:
    name: Frontend (TS + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run version:check
      - run: npm run typecheck
      - run: npm run lint -- --max-warnings=0
      - run: npm run format
      - run: npm run build

  # ── Backend check ──
  backend:
    name: Backend (cargo check)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cargo fmt
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Cargo clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Cargo check
        run: cargo check
        working-directory: src-tauri

      - name: Cargo test
        run: cargo test
        working-directory: src-tauri

  # ── Release (tag push only) ──
  release:
    name: Release ${{ github.ref_name }}
    needs: [frontend, backend]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Sync version from tag
        shell: bash
        run: |
          # Extract version from tag (v0.3.0 -> 0.3.0)
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          node scripts/sync-version.mjs "$VERSION"

          echo "Synced version to $VERSION"
          grep "^version" src-tauri/Cargo.toml
          node -e "console.log('package.json version:', require('./package.json').version)"

      - name: Build Tauri (release)
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          fail_on_unmatched: false
